<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#050505;color:#fff;min-height:100vh;}

.container{padding:18px;max-width:1200px;margin:auto;}

h1{font-size:26px;margin-bottom:10px;}
h2{margin:20px 0 10px;font-size:16px;color:#ff2a2a;}

.row{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:10px;
}

.card{
min-width:200px;
max-width:200px;
background:#111;
border-radius:12px;
overflow:hidden;
border:1px solid #222;
flex-shrink:0;
}

.media{
width:100%;
height:240px;
object-fit:cover;
background:black;
display:block;
}

.btns{
display:flex;
}

button{
flex:1;
padding:8px;
border:none;
cursor:pointer;
font-size:12px;
}

.open{background:#ff2a2a;color:#fff;}

.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
flex-direction:column;
}

.viewer img,.viewer video{
max-width:95%;
max-height:85vh;
}

.close{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:10px;
border:none;
cursor:pointer;
}

.nav{
margin-top:10px;
display:flex;
gap:20px;
}

.nav button{
background:#222;
color:#fff;
padding:10px 18px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>TroopDark Media Pro</h1>

<h2>FOTOS</h2>
<div class="row" id="photos"></div>

<h2>VÍDEOS</h2>
<div class="row" id="videos"></div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<button class="close" onclick="closeV()">X</button>
<div id="view"></div>

<div class="nav">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>
</div>

<script>

const photos = [
"https://files.catbox.moe/rodjgn.jpeg",
"https://files.catbox.moe/812efw.jpeg",
"https://files.catbox.moe/lshy42.jpeg",
"https://files.catbox.moe/p5efog.jpeg",
"https://files.catbox.moe/w3evmy.jpeg",
"https://files.catbox.moe/trkxik.jpeg",
"https://files.catbox.moe/9f3o5d.jpeg",
"https://files.catbox.moe/ey94a9.jpeg",
"https://files.catbox.moe/5icmne.jpeg",
"https://files.catbox.moe/khicr6.jpeg",
"https://files.catbox.moe/0u0ith.jpeg"
];

const videos = [
"https://files.catbox.moe/j5m77b.mp4",
"https://files.catbox.moe/o8v5o1.mp4",
"https://files.catbox.moe/tuxrxp.mp4",
"https://files.catbox.moe/8wcc9p.mp4"
];

let mode="photo";
let index=0;

const photosDiv=document.getElementById("photos");
const videosDiv=document.getElementById("videos");
const viewer=document.getElementById("viewer");
const view=document.getElementById("view");

/* ===== VIEWER ===== */
function openMedia(m,i){
mode=m;
index=i;
viewer.style.display="flex";
render();
}

function render(){
view.innerHTML="";

let list = mode==="photo"?photos:videos;
let url = list[index];

if(mode==="photo"){
view.innerHTML=`<img src="${url}">`;
}else{
const v=document.createElement("video");
v.src=url;
v.controls=true;
v.autoplay=true;
view.appendChild(v);
}
}

function next(){
let list = mode==="photo"?photos:videos;
index=(index+1)%list.length;
render();
}

function prev(){
let list = mode==="photo"?photos:videos;
index=(index-1+list.length)%list.length;
render();
}

function closeV(){
viewer.style.display="none";
view.innerHTML="";
}

/* ===== FOTOS ===== */
function addPhoto(url,i){
const c=document.createElement("div");
c.className="card";

c.innerHTML=`
<img class="media" loading="lazy" src="${url}">
<div class="btns">
<button class="open">Abrir</button>
</div>`;

c.querySelector("button").onclick=()=>openMedia("photo",i);

photosDiv.appendChild(c);
}

/* ===== VÍDEOS (OTIMIZADO + CAPA REAL) ===== */
function addVideo(url,i){
const c=document.createElement("div");
c.className="card";

const v=document.createElement("video");
v.className="media";
v.preload="none";
v.muted=true;
v.playsInline=true;

c.appendChild(v);

const b=document.createElement("div");
b.className="btns";
b.innerHTML=`<button class="open">Abrir</button>`;
b.querySelector("button").onclick=()=>openMedia("video",i);

c.appendChild(b);
videosDiv.appendChild(c);

/* Lazy load real */
const obs=new IntersectionObserver((entries)=>{
entries.forEach(e=>{
if(e.isIntersecting){
v.src=url;
v.load();

/* CAPA REAL */
v.addEventListener("loadeddata",()=>{
try{v.currentTime=0.1;}catch(err){}
});

obs.disconnect();
}
});
},{threshold:0.3});

obs.observe(c);
}

/* INIT */
photos.forEach(addPhoto);
videos.forEach(addVideo);

</script>

</body>
</html>
