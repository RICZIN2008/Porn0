<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TroopDark Media Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#050505;color:#fff;min-height:100vh;}

.container{padding:18px;max-width:1200px;margin:auto;}

h1{font-size:26px;margin-bottom:8px;}

h2{margin:25px 0 10px;font-size:18px;color:#ff2a2a;}

.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;}

.card{
min-width:220px;
max-width:220px;
background:#111;
border-radius:14px;
overflow:hidden;
flex-shrink:0;
border:1px solid #222;
}

.media{
width:100%;
height:260px;
object-fit:cover;
background:black;
display:block;
}

.btns{display:flex;}

button,a{
flex:1;
padding:10px;
border:none;
text-align:center;
font-size:12px;
cursor:pointer;
text-decoration:none;
}

.open{background:#ff2a2a;color:#fff;}
.dl{background:#222;color:#fff;}

.viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.viewer img,.viewer video{
max-width:95%;
max-height:90vh;
}

.close{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
padding:10px 14px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>TroopDark Media Pro</h1>

<h2>FOTOS</h2>
<div class="row" id="photos"></div>

<h2>VÍDEOS</h2>
<div class="row" id="videos"></div>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<button class="close" onclick="closeV()">X</button>
<div id="view"></div>
</div>

<script>

/* ✔ ARRAYS CORRIGIDOS */
const photos = [
"https://files.catbox.moe/rodjgn.jpeg",
"https://files.catbox.moe/812efw.jpeg",
"https://files.catbox.moe/lshy42.jpeg",
"https://files.catbox.moe/p5efog.jpeg",
"https://files.catbox.moe/w3evmy.jpeg",
"https://files.catbox.moe/trkxik.jpeg",  
"https://files.catbox.moe/9f3o5d.jpeg",
"https://files.catbox.moe/ey94a9.jpeg"
];

const videos = [
"https://files.catbox.moe/j5m77b.mp4",
"https://files.catbox.moe/o8v5o1.mp4",
"https://files.catbox.moe/tuxrxp.mp4"
];

const photosDiv = document.getElementById("photos");
const videosDiv = document.getElementById("videos");
const viewer = document.getElementById("viewer");
const view = document.getElementById("view");

/* FOTO */
function img(url){
const c=document.createElement("div");
c.className="card";

c.innerHTML=`
<img class="media" src="${url}">
<div class="btns">
<button class="open" onclick="openImg('${url}')">Abrir</button>
<a class="dl" href="${url}" download>Baixar</a>
</div>`;
photosDiv.appendChild(c);
}

/* VÍDEO (COM CAPA) */
function vid(url){
const c=document.createElement("div");
c.className="card";

const v=document.createElement("video");
v.src=url;
v.muted=true;
v.playsInline=true;
v.preload="metadata";
v.className="media";

/* capa */
v.addEventListener("loadedmetadata",()=>{
try{v.currentTime=0.1;}catch(e){}
});

c.appendChild(v);

const b=document.createElement("div");
b.className="btns";

const o=document.createElement("button");
o.className="open";
o.innerText="Abrir";
o.onclick=()=>openVid(url);

const d=document.createElement("a");
d.className="dl";
d.innerText="Baixar";
d.href=url;
d.download=true;

b.appendChild(o);
b.appendChild(d);
c.appendChild(b);

videosDiv.appendChild(c);
}

/* OPEN FOTO */
function openImg(u){
viewer.style.display="flex";
view.innerHTML=`<img src="${u}">`;
}

/* OPEN VÍDEO */
function openVid(u){
viewer.style.display="flex";
view.innerHTML="";

const v=document.createElement("video");
v.src=u;
v.controls=true;
v.autoplay=true;
v.muted=true;
v.playsInline=true;
v.style.maxWidth="95%";
v.style.maxHeight="90vh";

view.appendChild(v);
}

/* FECHAR */
function closeV(){
viewer.style.display="none";
view.innerHTML="";
}

/* RENDER */
photos.forEach(img);
videos.forEach(vid);

</script>

</body>
</html>
